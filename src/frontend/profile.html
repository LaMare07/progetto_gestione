<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profilo - Series Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header id="navbar" class="navbar"></header>

  <main class="container" id="content">
    <div class="empty">Caricamento...</div>
  </main>

  <footer id="footer" class="footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const u = SH.getQuery("u");
      const me = Storage_.getUser();
      const username = u || me?.username;
      const root = document.getElementById("content");

      if (!username) {
        root.innerHTML = `<div class="empty">Nessun profilo selezionato. <a href="login.html">Accedi</a></div>`;
        return;
      }

      // Recensioni dell'utente: somma seed + locali
      const seedReviews = (window.SEED_REVIEWS || []).filter(r => r.user === username);
      const ownReviews = Storage_.getUserReviews().filter(r => r.user === username);
      const reviews = [...ownReviews, ...seedReviews]
        .sort((a, b) => (b.date || "").localeCompare(a.date || ""));

      // Watchlist solo per il proprio profilo
      const isMe = me?.username === username;
      const watchlist = isMe ? Storage_.getWatchlist() : {};
      const wlIds = Object.keys(watchlist);

      const avgRating = reviews.length
        ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1)
        : "-";

      // Genere preferito
      let favGenre = "-";
      if (reviews.length) {
        const tally = {};
        reviews.forEach(r => {
          const s = SH.findSeries(r.seriesId);
          if (!s) return;
          s.genres.forEach(g => { tally[g] = (tally[g] || 0) + 1; });
        });
        const top = Object.entries(tally).sort((a, b) => b[1] - a[1])[0];
        if (top) favGenre = top[0];
      }

      root.innerHTML = `
        <section class="profile-head">
          <div class="profile-avatar">${username.charAt(0).toUpperCase()}</div>
          <div>
            <h1 style="margin:0;">@${SH.escapeHtml(username)}</h1>
            <div class="muted">Membro della community</div>
            <div class="profile-stats">
              <div><div class="stat-num">${reviews.length}</div><div class="stat-label">Recensioni</div></div>
              <div><div class="stat-num">${avgRating}</div><div class="stat-label">Voto medio</div></div>
              <div><div class="stat-num">${wlIds.length}</div><div class="stat-label">In watchlist</div></div>
              <div><div class="stat-num">${SH.escapeHtml(favGenre)}</div><div class="stat-label">Genere preferito</div></div>
            </div>
          </div>
          <span class="spacer"></span>
          ${isMe ? `<button class="btn btn-ghost" id="logout2">Esci</button>` : `<button class="btn btn-primary">Segui</button>`}
        </section>

        <nav class="tabs">
          <button class="tab active" data-tab="reviews">Recensioni</button>
          ${isMe ? `<button class="tab" data-tab="watchlist">Watchlist</button>` : ""}
        </nav>

        <section class="tab-panel active" data-panel="reviews">
          ${reviews.length ? reviews.map(r => {
            const s = SH.findSeries(r.seriesId);
            if (!s) return "";
            return `
              <div class="review">
                <div class="review-head">
                  <a href="series-detail.html?id=${s.id}" style="display:flex;gap:.6rem;align-items:center;">
                    <div class="card-poster" style="width:44px;aspect-ratio:2/3;${SH.posterStyle(s)};border-radius:6px;font-size:.9rem;">${s.title.charAt(0)}</div>
                    <strong>${SH.escapeHtml(s.title)}</strong>
                  </a>
                  <span class="review-rating">${r.rating}/10</span>
                  <span class="review-date">${r.date || ""}</span>
                </div>
                <div class="review-body">${SH.escapeHtml(r.body || "")}</div>
              </div>`;
          }).join("") : `<div class="empty">Nessuna recensione ancora.</div>`}
        </section>

        ${isMe ? `
          <section class="tab-panel" data-panel="watchlist">
            ${wlIds.length
              ? `<div class="grid">${wlIds.map(id => {
                  const s = SH.findSeries(id); return s ? SH.seriesCard(s) : "";
                }).join("")}</div>`
              : `<div class="empty">Watchlist vuota. <a href="series.html">Esplora il catalogo</a></div>`
            }
          </section>` : ""}
      `;

      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
          tab.classList.add("active");
          document.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add("active");
        });
      });

      document.getElementById("logout2")?.addEventListener("click", () => {
        Storage_.setUser(null);
        location.href = "index.html";
      });
    });
  </script>
</body>
</html>
